<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Content Manager</title>
    <style>
      #debug {
        position: fixed;
        bottom: 0;
        right: 0;
        background: #f0f0f0;
        border: 1px solid #ccc;
        padding: 10px;
        max-width: 50%;
        max-height: 200px;
        overflow: auto;
        z-index: 9999;
        font-family: monospace;
        font-size: 12px;
      }
      .debug-item {
        margin-bottom: 5px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 5px;
      }
      .login-button {
        margin: 20px;
        padding: 10px 15px;
        background-color: #0366d6;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      .container {
        margin: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Debug panel -->
    <div id="debug"></div>
    <div id="manual-login" class="container" style="display: none">
      <h2>Decap CMS Authentication</h2>
      <p>
        You have a GitHub token, but the CMS is having trouble
        initializing.
      </p>
      <button class="login-button" id="manual-auth-button">
        Try Manual Authentication
      </button>
    </div>

    <!-- Include the CMS script -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // Debugging helper
      function log(message, obj) {
        console.log(message, obj);
        const debugEl = document.getElementById('debug');
        if (debugEl) {
          const item = document.createElement('div');
          item.className = 'debug-item';
          item.textContent =
            message + (obj ? ': ' + JSON.stringify(obj) : '');
          debugEl.appendChild(item);
          // Scroll to bottom
          debugEl.scrollTop = debugEl.scrollHeight;
        }
      }

      // Alternative authentication approach
      function setupManualAuth() {
        const container = document.getElementById('manual-login');
        const authButton = document.getElementById(
          'manual-auth-button'
        );

        if (localStorage.getItem('githubToken')) {
          container.style.display = 'block';

          authButton.addEventListener('click', function () {
            // Attempt to manually initialize CMS
            initializeCMS(true);
          });
        }
      }

      // Check for token in URL hash
      function checkHash() {
        if (window.location.hash.includes('access_token=')) {
          const token = window.location.hash.match(
            /access_token=([^&]+)/
          );
          if (token && token[1]) {
            log('Found token in URL hash', {
              token: token[1].substring(0, 10) + '...',
            });
            localStorage.setItem('githubToken', token[1]);
            // Remove the token from the URL
            window.history.replaceState(
              null,
              null,
              window.location.pathname + window.location.search + '#/'
            );
            return token[1];
          }
        }
        return null;
      }

      // Handle authentication messages from popup
      window.addEventListener('message', function (event) {
        log('Received message', event.data);

        // Check if it's our authentication message
        if (
          event.data &&
          event.data.type === 'github:auth' &&
          event.data.token
        ) {
          log('Received token from popup', {
            token: event.data.token.substring(0, 10) + '...',
          });

          // Store the token in localStorage
          localStorage.setItem('githubToken', event.data.token);

          // Reload the page to apply the token
          log('Reloading page to apply token');
          setTimeout(() => {
            window.location.reload();
          }, 1000);
        }
      });

      // Initialize CMS
      function initializeCMS(forceInit = false) {
        // Manual initialization to override authentication endpoint
        window.CMS_MANUAL_INIT = true;

        const urlToken = checkHash();
        const storedToken = localStorage.getItem('githubToken');
        const token = urlToken || storedToken;

        if (!token && !forceInit) {
          log(
            'No token found, proceeding with normal initialization'
          );
          initializeBasicCMS();
          return;
        }

        log('Initializing CMS with token', {
          token: token ? token.substring(0, 10) + '...' : 'None',
        });

        // Determine if we're in local development
        const isLocalhost =
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1';

        // Check if we're on staging
        const isStaging =
          window.location.hostname.includes('staging');

        try {
          // Initialize with basic config first
          window.CMS.init({
            config: {
              backend: {
                name: isLocalhost ? 'test-repo' : 'github',
                repo: 'switch-to-eu/switch-to.eu',
                branch: isStaging ? 'staging' : 'main',
                auth_endpoint: '/api/auth',
                base_url: window.location.origin,
                auth_type: 'implicit',
                api_root: 'https://api.github.com',
                ...(token ? { token: token } : {}),
              },
              media_folder: 'public/images',
              public_folder: '/images',
              // Only define i18n if we're logged in
              ...(token
                ? {
                    i18n: {
                      structure: 'multiple_folders',
                      locales: ['en', 'nl'], // Each locale appears exactly once
                      default_locale: 'en',
                    },
                  }
                : {}),
              collections: [
                {
                  name: 'eu_services', // Ensure unique name (no hyphens)
                  label: 'EU Services',
                  folder: 'content/{{locale}}/services/eu',
                  create: true,
                  slug: '{{slug}}',
                  fields: [
                    { label: 'Name', name: 'name', widget: 'string' },
                    {
                      label: 'Category',
                      name: 'category',
                      widget: 'select',
                      options: [
                        'email',
                        'cloud-storage',
                        'messaging',
                        'productivity',
                        'social-media',
                        'video-conference',
                      ],
                    },
                    {
                      label: 'Description',
                      name: 'description',
                      widget: 'string',
                    },
                    {
                      label: 'Content',
                      name: 'body',
                      widget: 'markdown',
                    },
                  ],
                },
              ],
            },
          });

          log('CMS initialized successfully');
        } catch (error) {
          log('Error initializing CMS', error.message);
          // Show manual login if initialization fails
          setupManualAuth();
        }
      }

      // Initialize with basic config for login
      function initializeBasicCMS() {
        try {
          // Determine if we're in local development
          const isLocalhost =
            window.location.hostname === 'localhost' ||
            window.location.hostname === '127.0.0.1';

          // Check if we're on staging
          const isStaging =
            window.location.hostname.includes('staging');

          // Initialize with minimal config to show login
          window.CMS.init({
            config: {
              backend: {
                name: isLocalhost ? 'test-repo' : 'github',
                repo: 'switch-to-eu/switch-to.eu',
                branch: isStaging ? 'staging' : 'main',
                auth_endpoint: '/api/auth',
                base_url: window.location.origin,
              },
              media_folder: 'public/images',
              public_folder: '/images',
              collections: [
                {
                  name: 'basic_test',
                  label: 'Test',
                  folder: 'content',
                  create: true,
                  fields: [
                    {
                      name: 'title',
                      label: 'Title',
                      widget: 'string',
                    },
                  ],
                },
              ],
            },
          });
          log('Basic CMS initialized for login');
        } catch (error) {
          log('Error initializing basic CMS', error.message);
        }
      }

      // Initialize on page load
      window.addEventListener('load', function () {
        initializeCMS();
      });

      // Add a convenient logout function for testing
      window.logoutCMS = function () {
        localStorage.removeItem('githubToken');
        localStorage.removeItem('netlifySiteURL');
        log('Logged out. Clearing tokens...');
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      };

      // Check if user is authenticated
      window.checkAuth = function () {
        const token = localStorage.getItem('githubToken');
        if (token) {
          log('Token exists in localStorage', {
            token: token.substring(0, 10) + '...',
          });
        } else {
          log('No token found in localStorage');
        }
      };
    </script>
  </body>
</html>
